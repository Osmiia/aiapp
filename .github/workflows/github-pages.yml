name: Build & Deploy GoApp

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          go build -o goapp main.go

      - name: Run tests (if any)
        run: |
          echo "No tests provided"

      - name: Prepare static assets
        run: |
          mkdir -p ./github-pages
          echo '<html><body><h1>Welcome to GoApp on GitHub Pages!</h1><ul><li><a href="/api/health">/api/health</a></li><li><a href="/api/users">/api/users</a></li><li><a href="/api/products">/api/products</a></li></ul></body></html>' > ./github-pages/index.html

      - name: Copy API docs (optional)
        run: |
          echo '{"endpoints": ["/api/health", "/api/users", "/api/products"]}' > ./github-pages/endpoints.json

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./github-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post deployment info
        run: |
          echo "Deployed GoApp static info to GitHub Pages."
