name: Deploy Go App to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build app
        run: go build -o goapp .

      - name: Create static index.html for GitHub Pages
        run: |
          echo '<html><head><title>GoApp</title></head><body><h1>GoApp deployed via Github Actions</h1></body></html>' > index.html

      - name: Create gh-pages artifact
        run: |
          mkdir -p gh-pages
          cp index.html gh-pages/

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages
          path: gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: gh-pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
